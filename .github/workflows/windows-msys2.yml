name: Windows/MSYS2
on:
  workflow_dispatch:
    inputs:
      sign_build:
        description: 'Set to true to sign the build artifact.'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  msys2-ucrt64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-gtkmm3
            mingw-w64-ucrt-x86_64-gtksourceview4
            mingw-w64-ucrt-x86_64-libxml++2.6
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-gspell
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-uchardet
            mingw-w64-ucrt-x86_64-fribidi
            mingw-w64-ucrt-x86_64-fmt
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-texlive-core
            mingw-w64-ucrt-x86_64-gettext
            p7zip
            git
            sed
      - name: Initialize TeX Live
        run: |
          mkdir -p /ucrt64/var/lib/texmf/web2c/pdftex
          cd /ucrt64/var/lib/texmf/web2c/pdftex
          pdftex -ini -jobname=latex -progname=latex *latex.ini
      - name: CI-Build
        run: |
          scripts/msys2_prepare_standalone.sh
          scripts/generate_nolatex_iss.sh
          sed -i 's/C:\\msys64\\home\\PenoneG\\git/D:\\a\\cherrytree/g' scripts/cherrytree.iss
          sed -i 's/C:\\msys64\\home\\PenoneG\\git/D:\\a\\cherrytree/g' scripts/cherrytree_nolatex.iss
      - name: Ensure Inno Setup
        shell: powershell
        run: |
          $isccExe = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccExe) {
            Write-Host "Found ISCC at $isccExe"
            exit 0
          }

          $choco = Get-Command choco -ErrorAction SilentlyContinue
          if ($null -ne $choco) {
            choco install innosetup --no-progress -y
          }
          else {
            winget install --id JRSoftware.InnoSetup --exact --silent --accept-package-agreements --accept-source-agreements
          }

          if (!(Test-Path $isccExe)) {
            throw "ISCC not found after installation attempt"
          }
      - name: Compile .ISS to .EXE Installer (NOLATEX)
        shell: powershell
        run: |
          $isccExe = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $isccExe)) {
            throw "ISCC not found at $isccExe"
          }
          & $isccExe "/Q" "scripts\cherrytree_nolatex.iss"
      - name: Compile .ISS to .EXE Installer (FULL)
        shell: powershell
        run: |
          $isccExe = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $isccExe)) {
            throw "ISCC not found at $isccExe"
          }
          & $isccExe "/Q" "scripts\cherrytree.iss"
      - name: Upload Unsigned Artifact
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v7
        with:
          name: cherrytree-unsigned
          path: |
            build/cherrytree*.7z
            build/cherrytree*.exe
          retention-days: 3
          overwrite: true
          if-no-files-found: error
      - name: SignPath Signing
        if: ${{ github.event.inputs.sign_build == 'true' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'cherrytree'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: cherrytree-signed
      - name: Upload Signed Artifact
        if: ${{ github.event.inputs.sign_build == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: cherrytree-signed
          path: cherrytree-signed
          retention-days: 3
          overwrite: true
          if-no-files-found: error
